<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>{{title}} - Twin Cape</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <a href="/" aria-label="Twin Cape home">
            <img src="/images/logo/logo_text.png" alt="Twin Cape Asset Management - Investment Management" class="logo" title="Twin Cape Asset Management">
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Open navigation">
            <span class="nav-toggle-bar" aria-hidden="true"></span>
            <span class="nav-toggle-bar" aria-hidden="true"></span>
            <span class="nav-toggle-bar" aria-hidden="true"></span>
        </button>
    </header>

    <div class="container">
        {{nav}}

        <main>
            {{content}}
        </main>
    </div>

    <footer>
        <p>&copy; {{year}} Twin Cape Asset Management, Inc. All rights reserved.</p>
    </footer>

    <script src="/nav.js" defer></script>
</body>
</html>
